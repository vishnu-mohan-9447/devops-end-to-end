server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Serve static frontend assets
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health check for Kubernetes
    location /nginx-health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # API proxy - works in both Docker Compose and Kubernetes
    location /api/ {
        # Try Kubernetes service first, fallback to Docker Compose service name
        proxy_pass http://lms-backend:5000/api/;
        # Fallback for dev (Docker Compose)
        # proxy_pass http://backend:5000/api/;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # Health check for backend
    location /health {
        proxy_pass http://lms-backend:5000/health;
    }
}
