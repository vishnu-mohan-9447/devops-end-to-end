# Dev deployment compose file - used by the Jenkins "Deploy to Dev" stage.
# Unlike docker-compose.yml (build-from-source, for local dev), this pulls the
# exact images Jenkins already built, scanned, and pushed in Phase 4.
#
# Requires DOCKERHUB_NAMESPACE and IMAGE_TAG to be set (via --env-file or
# exported env vars) when running `docker compose ... up`.

services:
  database:
    image: ${DOCKERHUB_NAMESPACE}/lms-database:${IMAGE_TAG:-latest}
    container_name: lms-database
    restart: unless-stopped
    environment:
      POSTGRES_DB: lms_db
      POSTGRES_USER: lms_user
      POSTGRES_PASSWORD: lms_password
    volumes:
      - lms_db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lms_user -d lms_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lms-network

  backend:
    image: ${DOCKERHUB_NAMESPACE}/lms-backend:${IMAGE_TAG:-latest}
    container_name: lms-backend
    restart: unless-stopped
    environment:
      PORT: 5000
      NODE_ENV: development
      DB_HOST: database
      DB_PORT: 5432
      DB_NAME: lms_db
      DB_USER: lms_user
      DB_PASSWORD: lms_password
      JWT_SECRET: dev-secret-change-in-production
      JWT_EXPIRES_IN: 8h
      CORS_ORIGIN: "*"
    ports:
      - "5000:5000"
    depends_on:
      database:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/health', r => process.exit(r.statusCode===200?0:1)).on('error', () => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - lms-network

  frontend:
    image: ${DOCKERHUB_NAMESPACE}/lms-frontend:${IMAGE_TAG:-latest}
    container_name: lms-frontend
    restart: unless-stopped
    ports:
      - "8082:8080"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - lms-network

volumes:
  lms_db_data:

networks:
  lms-network:
    driver: bridge
